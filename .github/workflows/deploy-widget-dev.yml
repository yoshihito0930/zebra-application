name: Deploy Widget to AWS (Dev)

on:
  # mainブランチへのpush時に自動実行（ウィジェット関連の変更のみ）
  push:
    branches:
      - main
    paths:
      - 'frontend/src/widget/**'
      - 'frontend/vite.widget.config.ts'
      - 'frontend/src/services/api.ts'
      # ウィジェットはカレンダー〜予約フォームを共有バンドルする。
      # EmbeddedCalendar 単体ではなく、それが取り込む予約フォーム・共通部品・
      # フック・型・ユーティリティの変更でも再デプロイされるようパスを拡張。
      - 'frontend/src/components/calendar/**'
      - 'frontend/src/components/reservation/**'
      - 'frontend/src/components/common/**'
      - 'frontend/src/hooks/**'
      - 'frontend/src/stores/**'
      - 'frontend/src/types/**'
      - 'frontend/src/utils/**'
      - '.github/workflows/deploy-widget-dev.yml'

  # 手動トリガー
  workflow_dispatch:

# GitHub ActionsがAWSにアクセスするための権限
permissions:
  id-token: write   # OIDC認証に必要
  contents: read    # リポジトリ読み取り

jobs:
  deploy:
    name: Deploy Widget
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.jsのセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. AWS認証（OIDC）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # 4. 依存関係のインストール
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # 5. ウィジェットビルド（dist-widget/zebra-widget.js を生成）
      #    API ベースURLは埋め込み時の data-api-base-url で実行時注入されるため、
      #    .env.production は不要。
      - name: Build widget
        working-directory: frontend
        run: npm run build:widget

      # 6. ビルド出力の確認（favicon.svg / icons.svg が混入していないこと）
      - name: Verify widget build output
        working-directory: frontend
        run: |
          echo "dist-widget の内容:"
          ls -la dist-widget
          if [ ! -f dist-widget/zebra-widget.js ]; then
            echo "::error::dist-widget/zebra-widget.js が生成されていません"
            exit 1
          fi
          if [ -f dist-widget/favicon.svg ] || [ -f dist-widget/icons.svg ]; then
            echo "::error::不要な public アセット(favicon.svg/icons.svg)が混入しています"
            exit 1
          fi

      # 7. S3へアップロード（/widget/ プレフィックス配下）
      - name: Upload widget to S3
        working-directory: frontend
        run: |
          aws s3 cp dist-widget/zebra-widget.js \
            s3://${{ secrets.WIDGET_S3_BUCKET }}/widget/zebra-widget.js \
            --cache-control "public,max-age=300,must-revalidate" \
            --content-type "application/javascript"

      # 8. CloudFrontキャッシュ無効化（/widget/* のみ）
      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/widget/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "✅ キャッシュ無効化リクエストID: $INVALIDATION_ID"

      # 9. デプロイ完了メッセージ
      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 ウィジェットのデプロイが完了しました！"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 S3バケット: ${{ secrets.WIDGET_S3_BUCKET }}/widget/zebra-widget.js"
          echo "🌐 配信URL: ${{ secrets.CLOUDFRONT_URL }}/widget/zebra-widget.js"
          echo "🔄 CloudFront無効化ID: ${{ steps.invalidate.outputs.invalidation_id }}"
          echo ""
          echo "⚠️  キャッシュ無効化には数分かかる場合があります"
