name: Deploy Frontend to AWS (Dev)

on:
  # mainブランチへのpush時に自動実行（frontend配下の変更のみ）
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-dev.yml'

  # 手動トリガー
  workflow_dispatch:

# GitHub ActionsがAWSにアクセスするための権限
permissions:
  id-token: write   # OIDC認証に必要
  contents: read    # リポジトリ読み取り

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: dev  # GitHub Environmentsを使用（オプション）

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.jsのセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. AWS認証（OIDC）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # 4. 依存関係のインストール
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # 5. Lintチェック
      - name: Run linter
        working-directory: frontend
        run: npm run lint
        continue-on-error: true  # Lintエラーがあっても続行（警告として扱う）

      # 6. 環境変数ファイルの生成
      - name: Generate .env.production
        working-directory: frontend
        run: |
          cat > .env.production <<EOF
          # 自動生成された環境変数ファイル
          # 生成日時: $(date '+%Y-%m-%d %H:%M:%S')
          # GitHub Actions Run: ${{ github.run_id }}

          # API設定
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          VITE_API_TIMEOUT=30000

          # AWS Cognito設定
          VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION=ap-northeast-1

          # スタジオID（開発用）
          VITE_DEFAULT_STUDIO_ID=studio_001

          # 環境
          VITE_ENV=dev
          EOF

          echo "✅ .env.production を生成しました"
          echo "生成された環境変数（一部マスク）:"
          cat .env.production | sed 's/\(VITE_COGNITO_CLIENT_ID=\).*/\1***MASKED***/'

      # 7. フロントエンドビルド
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # 8. S3へアップロード（静的ファイル）
      - name: Upload to S3 (static files)
        working-directory: frontend
        run: |
          aws s3 sync dist s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.html"

      # 9. S3へアップロード（HTMLファイル）
      - name: Upload to S3 (HTML files)
        working-directory: frontend
        run: |
          aws s3 sync dist s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public,max-age=300,must-revalidate"

      # 10. CloudFrontキャッシュ無効化
      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "✅ キャッシュ無効化リクエストID: $INVALIDATION_ID"

      # 11. デプロイ完了メッセージ
      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 デプロイが完了しました！"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 S3バケット: ${{ secrets.S3_BUCKET }}"
          echo "🌐 アクセスURL: ${{ secrets.CLOUDFRONT_URL }}"
          echo "🔄 CloudFront無効化ID: ${{ steps.invalidate.outputs.invalidation_id }}"
          echo ""
          echo "⚠️  キャッシュ無効化には数分かかる場合があります"
          echo ""
